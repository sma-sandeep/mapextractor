<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maps Extractor</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBe0av8z-eStU17dap_mYi5PaHGPhoED4&libraries=places"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f5f7fb;padding:30px}
.container{max-width:1100px;margin:auto}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.08);margin-bottom:20px}
input{padding:10px;border:1px solid #ccc;border-radius:6px;width:30%}
button{padding:10px 16px;border:none;background:#1e6a3b;color:#fff;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
th{background:#1e6a3b;color:#fff}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Maps Extractor</h3>

<input id="keyword" placeholder="Keyword">
<input id="location" placeholder="Location">
<button onclick="search()">Search</button>
<button onclick="download()">Download</button>

<p id="status">Checking API...</p>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Phone</th>
<th>Website</th>
<th>Email</th>
</tr>
</thead>
<tbody id="data">
<tr><td colspan="6">No data</td></tr>
</tbody>
</table>
</div>

</div>
<script>
async function search() {

    if (!service) {
        alert("API not ready");
        return;
    }

    let keyword = document.getElementById("keyword").value.trim();
    let location = document.getElementById("location").value.trim();

    if (!keyword) return alert("Enter keyword");

    let query = keyword + (location ? " " + location : "");

    document.getElementById("status").innerText = "Searching...";

    let allResults = [];

    function fetchPage(request, page = 1) {

        service.textSearch(request, (results, status, pagination) => {

            if (status !== google.maps.places.PlacesServiceStatus.OK) {
                document.getElementById("status").innerText = "Error: " + status;
                return;
            }

            allResults = allResults.concat(results);

            document.getElementById("status").innerText =
                "Loaded page " + page + " (" + allResults.length + " results)";

            // 🔥 NEXT PAGE (MAX 3 PAGES)
            if (pagination && pagination.hasNextPage) {
                setTimeout(() => {
                    pagination.nextPage();
                }, 2000); // required delay
            } else {
                processResults(allResults);
            }
        });
    }

    fetchPage({ query: query });
}

async function processResults(results) {

    document.getElementById("status").innerText = "Fetching details...";

    let promises = results.map(p => getDetails(p.place_id));
    let data = await Promise.all(promises);

    finalData = data.filter(x => x);
    render(finalData);

    document.getElementById("status").innerText =
        "Done: " + finalData.length + " results";
}
</script>


</body>
</html>
