<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maps Extractor</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBe0av8z-eStU17dap_mYi5PaHGPhoED4&libraries=places"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f5f7fb;padding:30px}
.container{max-width:1100px;margin:auto}
.card{background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.08);margin-bottom:20px}
input{padding:10px;border:1px solid #ccc;border-radius:6px;width:30%}
button{padding:10px 16px;border:none;background:#1e6a3b;color:#fff;border-radius:6px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
th{background:#1e6a3b;color:#fff}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Maps Extractor</h3>

<input id="keyword" placeholder="Keyword">
<input id="location" placeholder="Location">
<button onclick="search()">Search</button>
<button onclick="download()">Download</button>

<p id="status">Checking API...</p>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Phone</th>
<th>Website</th>
<th>Email</th>
</tr>
</thead>
<tbody id="data">
<tr><td colspan="6">No data</td></tr>
</tbody>
</table>
</div>

</div>

<script>
let service = null;
let finalData = [];

function checkAPI() {
    if (window.google && google.maps && google.maps.places) {
        service = new google.maps.places.PlacesService(document.createElement("div"));
        document.getElementById("status").innerText = "API Ready";
    } else {
        document.getElementById("status").innerText = "Loading API...";
        setTimeout(checkAPI, 1000);
    }
}

checkAPI();

async function search() {

    if (!service) {
        alert("API still loading. Check console.");
        return;
    }

    let keyword = document.getElementById("keyword").value.trim();
    let location = document.getElementById("location").value.trim();

    if (!keyword) return alert("Enter keyword");

    let query = keyword + (location ? " " + location : "");

    document.getElementById("status").innerText = "Searching...";

    service.textSearch({ query: query }, async (results, status) => {

        if (status !== google.maps.places.PlacesServiceStatus.OK) {
            document.getElementById("status").innerText = "Error: " + status;
            console.error(status);
            return;
        }

        let promises = results.slice(0,20).map(p => getDetails(p.place_id));
        let data = await Promise.all(promises);

        finalData = data.filter(x=>x);
        render(finalData);

        document.getElementById("status").innerText = "Found: " + finalData.length;
    });
}

function getDetails(id) {
    return new Promise(resolve=>{
        service.getDetails({
            placeId:id,
            fields:["name","formatted_address","formatted_phone_number","website"]
        },(r,s)=>{
            if(s!=="OK") return resolve(null);

            let email="";
            if(r.website){
                try{
                    let d=new URL(r.website).hostname.replace("www.","");
                    email="contact@"+d;
                }catch{}
            }

            resolve({
                name:r.name,
                address:r.formatted_address,
                phone:r.formatted_phone_number||"N/A",
                website:r.website||"-",
                email:email||"N/A"
            });
        });
    });
}

function render(data){
    let html="";
    data.forEach((d,i)=>{
        html+=`<tr>
        <td>${i+1}</td>
        <td>${d.name}</td>
        <td>${d.address}</td>
        <td>${d.phone}</td>
        <td>${d.website!=="-"?`<a href="${d.website}" target="_blank">Visit</a>`:"-"}</td>
        <td>${d.email}</td>
        </tr>`;
    });
    document.getElementById("data").innerHTML=html||"<tr><td colspan='6'>No data</td></tr>";
}

function download(){
    if(!finalData.length) return alert("No data");

    let ws=XLSX.utils.json_to_sheet(finalData);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Data");
    XLSX.writeFile(wb,"maps.xlsx");
}
</script>

</body>
</html>
