```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps Data Extractor</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBe0av8z-eStU17dap_mYi5PaHGPhoED4&libraries=places&callback=initMap" async defer></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 30px;
}
.container {
    max-width: 1200px;
    margin: auto;
}
.card {
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}
h2 {
    margin: 0 0 10px;
}
.inputs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
input {
    flex: 1;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
button {
    padding: 10px 18px;
    border: none;
    background: #1e6a3b;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}
button.secondary {
    background: #2c5a7a;
}
.status {
    margin-top: 10px;
    font-size: 14px;
    color: #444;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
}
th {
    background: #1e6a3b;
    color: #fff;
    text-align: left;
}
tr:hover {
    background: #f9fbff;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Maps Extractor</h2>

<div class="inputs">
<input type="text" id="keyword" placeholder="Enter keyword (e.g. dentist)">
<input type="text" id="location" placeholder="Enter location (e.g. Delhi)">
<button onclick="searchPlaces()">Search</button>
<button class="secondary" onclick="downloadExcel()">Download</button>
</div>

<div class="status" id="status">Ready</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Phone</th>
<th>Website</th>
<th>Email</th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td colspan="6">No data</td></tr>
</tbody>
</table>
</div>

</div>

<script>
let map, service;
let finalData = [];

function initMap() {
    map = new google.maps.Map(document.createElement("div"));
    service = new google.maps.places.PlacesService(map);
}

async function searchPlaces() {
    let keyword = document.getElementById("keyword").value.trim();
    let location = document.getElementById("location").value.trim();

    if (!keyword) return alert("Enter keyword");

    let query = keyword + (location ? " " + location : "");

    document.getElementById("status").innerText = "Searching...";

    service.textSearch({ query: query }, async (results, status) => {

        if (status !== google.maps.places.PlacesServiceStatus.OK) {
            document.getElementById("status").innerText = "No results found";
            return;
        }

        let limited = results.slice(0, 20);

        // ⚡ Parallel processing (FAST)
        let promises = limited.map(place => getDetails(place.place_id));
        let data = await Promise.all(promises);

        finalData = data.filter(x => x !== null);
        renderTable(finalData);

        document.getElementById("status").innerText = "Results: " + finalData.length;
    });
}

function getDetails(placeId) {
    return new Promise(resolve => {
        service.getDetails({
            placeId: placeId,
            fields: ["name","formatted_address","formatted_phone_number","website"]
        }, (res, status) => {

            if (status !== google.maps.places.PlacesServiceStatus.OK) {
                resolve(null);
                return;
            }

            let email = "";
            if (res.website) {
                try {
                    let domain = new URL(res.website).hostname.replace("www.","");
                    email = "contact@" + domain;
                } catch {}
            }

            resolve({
                name: res.name,
                address: res.formatted_address,
                phone: res.formatted_phone_number || "N/A",
                website: res.website || "-",
                email: email || "N/A"
            });
        });
    });
}

function renderTable(data) {
    let body = document.getElementById("tableBody");

    if (!data.length) {
        body.innerHTML = "<tr><td colspan='6'>No data</td></tr>";
        return;
    }

    let html = "";

    data.forEach((d,i)=>{
        html += `
        <tr>
        <td>${i+1}</td>
        <td>${d.name}</td>
        <td>${d.address}</td>
        <td>${d.phone}</td>
        <td>${d.website !== "-" ? `<a href="${d.website}" target="_blank">Visit</a>` : "-"}</td>
        <td>${d.email}</td>
        </tr>`;
    });

    body.innerHTML = html;
}

function downloadExcel() {
    if (!finalData.length) return alert("No data");

    let ws = XLSX.utils.json_to_sheet(finalData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");

    XLSX.writeFile(wb, "maps_data.xlsx");
}
</script>

</body>
</html>
