```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Maps Extractor Pro</title>

<!-- ✅ FIXED API SCRIPT -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBe0av8z-eStU17dap_mYi5PaHGPhoED4&libraries=places&callback=initMap" async defer></script>

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;padding:20px;background:#f4f6f9}
input,select,button{padding:10px;margin:5px;border-radius:6px;border:1px solid #ccc}
button{cursor:pointer;background:#1e6a3b;color:#fff;border:none}
table{width:100%;border-collapse:collapse;margin-top:20px;background:#fff}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
th{background:#1e6a3b;color:#fff}
</style>
</head>

<body>

<h2>Google Maps Extractor</h2>

<input type="text" id="searchKeyword" placeholder="Keyword (e.g. cafe)">
<input type="text" id="locationInput" placeholder="Location (optional)">
<select id="radiusSelect">
<option value="500">500m</option>
<option value="1000">1km</option>
<option value="2000">2km</option>
<option value="5000">5km</option>
</select>

<button onclick="performExtraction()">Extract</button>
<button onclick="exportToExcel()">Download Excel</button>

<p id="statusText">Loading API...</p>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Phone</th>
<th>Website</th>
<th>Email</th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td colspan="6">No Data</td></tr>
</tbody>
</table>

<script>
let map, geocoder, placesService;
let extractedPlacesData = [];
let userCoords = null;

function initMap() {
    map = new google.maps.Map(document.createElement("div"), {
        center: { lat: 28.6139, lng: 77.2090 },
        zoom: 10
    });

    geocoder = new google.maps.Geocoder();
    placesService = new google.maps.places.PlacesService(map);

    document.getElementById("statusText").innerHTML = "✅ API Ready";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            userCoords = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
            };
        });
    }
}

async function getSearchCenter() {
    let loc = document.getElementById("locationInput").value.trim();

    if (loc !== "") {
        return new Promise(resolve => {
            geocoder.geocode({ address: loc }, (res, status) => {
                if (status === "OK") {
                    resolve({
                        lat: res[0].geometry.location.lat(),
                        lng: res[0].geometry.location.lng(),
                        name: loc
                    });
                } else {
                    resolve({ lat: 28.6139, lng: 77.2090, name: "Default Delhi" });
                }
            });
        });
    } else if (userCoords) {
        return { lat: userCoords.lat, lng: userCoords.lng, name: "Your Location" };
    } else {
        return { lat: 28.6139, lng: 77.2090, name: "Default Delhi" };
    }
}

async function performExtraction() {
    let keyword = document.getElementById("searchKeyword").value.trim();
    let radius = parseInt(document.getElementById("radiusSelect").value);

    if (!keyword) return alert("Enter keyword");

    let center = await getSearchCenter();

    document.getElementById("statusText").innerHTML = "🔍 Searching...";

    placesService.nearbySearch({
        location: new google.maps.LatLng(center.lat, center.lng),
        radius: radius,
        keyword: keyword
    }, async (results, status) => {

        if (status !== google.maps.places.PlacesServiceStatus.OK) {
            document.getElementById("statusText").innerHTML = "❌ No results";
            return;
        }

        let finalData = [];

        for (let place of results) {

            let details = await new Promise(resolve => {
                placesService.getDetails({
                    placeId: place.place_id,
                    fields: ["name","formatted_address","formatted_phone_number","website"]
                }, (res, stat) => {

                    if (stat === google.maps.places.PlacesServiceStatus.OK) {

                        let email = "";
                        if (res.website) {
                            try {
                                let domain = new URL(res.website).hostname.replace("www.","");
                                email = "contact@" + domain;
                            } catch {}
                        }

                        resolve({
                            name: res.name,
                            address: res.formatted_address,
                            phone: res.formatted_phone_number || "N/A",
                            website: res.website || "-",
                            email: email || "N/A"
                        });

                    } else resolve(null);
                });
            });

            if (details) finalData.push(details);
        }

        extractedPlacesData = finalData;
        renderTable(finalData);

        document.getElementById("statusText").innerHTML = "✅ Found " + finalData.length + " results";
    });
}

function renderTable(data) {
    let tbody = document.getElementById("tableBody");

    if (!data.length) {
        tbody.innerHTML = "<tr><td colspan='6'>No Data</td></tr>";
        return;
    }

    let html = "";

    data.forEach((d,i)=>{
        html += `<tr>
        <td>${i+1}</td>
        <td>${d.name}</td>
        <td>${d.address}</td>
        <td>${d.phone}</td>
        <td>${d.website !== "-" ? `<a href="${d.website}" target="_blank">Visit</a>` : "-"}</td>
        <td>${d.email}</td>
        </tr>`;
    });

    tbody.innerHTML = html;
}

function exportToExcel() {
    if (!extractedPlacesData.length) return alert("No data");

    let ws = XLSX.utils.json_to_sheet(extractedPlacesData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");

    XLSX.writeFile(wb, "maps_data.xlsx");
}
</script>

</body>
</html>
```
