<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps Extractor</title>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCBe0av8z-eStU17dap_mYi5PaHGPhoED4&libraries=places&callback=initMap" async defer></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>
body {font-family:Segoe UI;background:#f4f6f9;padding:30px;}
.container {max-width:1100px;margin:auto;}
.card {background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.08);margin-bottom:20px;}
.inputs {display:flex;gap:10px;}
input {flex:1;padding:10px;border:1px solid #ccc;border-radius:6px;}
button {padding:10px 16px;border:none;border-radius:6px;background:#1e6a3b;color:#fff;cursor:pointer;}
button:disabled {background:#999;cursor:not-allowed;}
table {width:100%;border-collapse:collapse;}
th,td {padding:10px;border-bottom:1px solid #eee;}
th {background:#1e6a3b;color:#fff;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Maps Extractor</h2>

<div class="inputs">
<input id="keyword" placeholder="Keyword (hotel, dentist)">
<input id="location" placeholder="Location (Delhi, Mumbai)">
<button id="searchBtn" disabled>Search</button>
<button onclick="downloadExcel()">Download</button>
</div>

<p id="status">Loading API...</p>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Phone</th>
<th>Website</th>
<th>Email</th>
</tr>
</thead>
<tbody id="tableBody">
<tr><td colspan="6">No data</td></tr>
</tbody>
</table>
</div>

</div>

<script>
let map, service;
let finalData = [];

function initMap() {
    map = new google.maps.Map(document.createElement("div"));
    service = new google.maps.places.PlacesService(map);

    document.getElementById("status").innerText = "API Ready";
    document.getElementById("searchBtn").disabled = false;
}

document.getElementById("searchBtn").addEventListener("click", searchPlaces);

async function searchPlaces() {

    let keyword = document.getElementById("keyword").value.trim();
    let location = document.getElementById("location").value.trim();

    if (!keyword) return alert("Enter keyword");

    let query = keyword + (location ? " " + location : "");

    document.getElementById("status").innerText = "Searching...";

    service.textSearch({ query: query }, async (results, status) => {

        if (status !== google.maps.places.PlacesServiceStatus.OK) {
            document.getElementById("status").innerText = "Error: " + status;
            return;
        }

        let promises = results.slice(0,20).map(p => getDetails(p.place_id));
        let data = await Promise.all(promises);

        finalData = data.filter(x => x);
        renderTable(finalData);

        document.getElementById("status").innerText = "Found: " + finalData.length;
    });
}

function getDetails(placeId) {
    return new Promise(resolve => {
        service.getDetails({
            placeId: placeId,
            fields: ["name","formatted_address","formatted_phone_number","website"]
        }, (res, status) => {

            if (status !== google.maps.places.PlacesServiceStatus.OK) {
                resolve(null);
                return;
            }

            let email = "";
            if (res.website) {
                try {
                    let domain = new URL(res.website).hostname.replace("www.","");
                    email = "contact@" + domain;
                } catch {}
            }

            resolve({
                name: res.name,
                address: res.formatted_address,
                phone: res.formatted_phone_number || "N/A",
                website: res.website || "-",
                email: email || "N/A"
            });
        });
    });
}

function renderTable(data) {
    let body = document.getElementById("tableBody");

    if (!data.length) {
        body.innerHTML = "<tr><td colspan='6'>No data</td></tr>";
        return;
    }

    body.innerHTML = data.map((d,i)=>`
    <tr>
    <td>${i+1}</td>
    <td>${d.name}</td>
    <td>${d.address}</td>
    <td>${d.phone}</td>
    <td>${d.website !== "-" ? `<a href="${d.website}" target="_blank">Visit</a>` : "-"}</td>
    <td>${d.email}</td>
    </tr>`).join("");
}

function downloadExcel() {
    if (!finalData.length) return alert("No data");

    let ws = XLSX.utils.json_to_sheet(finalData);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Data");

    XLSX.writeFile(wb, "maps_data.xlsx");
}

// API error
window.gm_authFailure = function() {
    document.getElementById("status").innerText = "Invalid API Key";
};
</script>

</body>
</html>
